<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global AI Talent Distribution · Graph</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .graphWrap {
        position: relative;
        min-height: 100vh;
        width: 100%;
      }
      #graph {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"
      onerror="this.onerror=null;this.src='https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js';"
    ></script>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="brand">关系网 · 人 + 公司实体</h1>
        <div class="hint">
          点击节点：右侧打开迁徙地图，并用 query 参数对齐过滤。
        </div>

        <div class="field">
          <label>搜索</label>
          <input id="searchInput" type="text" placeholder="输入节点名称，例如：Researcher A / OpenAI" />
        </div>

        <div class="field">
          <div class="row">
            <a class="btn" href="./map.html">时间轴地图</a>
            <a class="btn secondary" href="../">Docs</a>
          </div>
        </div>

        <div class="footer">
          数据：<a href="../data/relations.json">relations.json</a>
        </div>
      </aside>

      <main class="graphWrap">
        <div id="graph"></div>
      </main>
    </div>
    <script type="module" src="./graph.js"></script>
  </body>
</html>
