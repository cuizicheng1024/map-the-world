<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global AI Talent Distribution · People Graph</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./kimi.css" />
    <style>
      .graphWrap {
        position: relative;
        min-height: 100vh;
        width: 100%;
      }
      #graph {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(900px 520px at 62% 46%, rgba(66,133,244,0.10), rgba(245,245,247,0) 60%),
          radial-gradient(720px 520px at 72% 62%, rgba(219,68,55,0.08), rgba(245,245,247,0) 60%),
          linear-gradient(180deg, #f5f5f7, #eef2f6);
      }
      #graph canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .row.wrap {
        flex-wrap: wrap;
      }
      #layoutRoot.collapsed {
        grid-template-columns: 56px 1fr;
      }
      #layoutRoot.collapsed .sidebar {
        padding: 10px 8px;
      }
      #layoutRoot.collapsed .sidebarContent {
        display: none;
      }
      #layoutRoot.collapsed .brand {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="layout" id="layoutRoot">
      <aside class="sidebar">
        <div class="row" style="justify-content: space-between; align-items: flex-start">
          <h1 class="brand">🕸️ 人物关系网</h1>
          <button id="toggleSidebarBtn" class="btn secondary icon" aria-label="收起侧栏" title="收起侧栏">⟨</button>
        </div>

        <div class="sidebarContent">
          <div class="legend">
            <div class="legendItem"><span class="dot dotPerson"></span><span>人物</span></div>
            <div class="legendItem"><span class="dot dotOrg"></span><span>机构</span></div>
          </div>
          <div class="hint" style="margin-top: 10px">滚轮缩放 · 拖拽平移 · 点击查看详情 · ESC 清空</div>

          <div class="field">
            <label>搜索</label>
            <input id="searchInput" type="text" placeholder="输入人物姓名，例如：李开复 / Geoffrey Hinton" />
          </div>

          <div class="field">
            <label>关联关系</label>
            <div class="row">
              <button id="toggleEdgesBtn" class="btn">关联线：开</button>
            </div>
          </div>

          <div class="field">
            <label>布局</label>
            <div class="row wrap">
              <button id="layoutRingBtn" class="btn secondary">环形</button>
              <button id="layoutRadialBtn" class="btn secondary">径向</button>
              <button id="layoutGeoBtn" class="btn secondary">地理</button>
              <button id="layoutForceBtn" class="btn">力导向</button>
            </div>
          </div>

          <div class="field" id="geoYearField">
            <label>地理布局年份</label>
            <input id="geoYear" type="range" min="1912" max="2026" step="1" value="2026" />
            <div class="kv"><span>1912</span><span id="geoYearLabel">2026</span></div>
          </div>

          <div class="field">
            <div class="row">
              <a class="btn" href="./cesium.html">🌍 3D 地球</a>
            </div>
          </div>
        </div>
      </aside>

      <main class="graphWrap">
        <div id="graph">
          <canvas id="graphCanvas"></canvas>
          <div id="hoverTip" class="tipCard" hidden></div>
          <div id="graphOverlay" class="overlay" hidden>
            <div class="overlayCard">
              <div id="graphOverlayTitle" class="overlayTitle">加载中…</div>
              <div id="graphOverlaySub" class="overlaySub">正在准备关系网</div>
              <div class="row" style="margin-top: 10px; justify-content: flex-end">
                <button id="graphOverlayRetry" class="btn secondary">重试</button>
                <button id="graphOverlaySkip" class="btn secondary">跳过布局</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./graph.js?v=20260422-4"></script>
  </body>
</html>
