<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global AI Talent Distribution · People Graph</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .graphWrap {
        position: relative;
        min-height: 100vh;
        width: 100%;
      }
      #graph {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      #graph canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="brand">人物关系网</h1>
        <div class="hint">
          双击人物节点：右侧打开迁徙地图并自动过滤到该人物。
        </div>

        <div class="field">
          <label>搜索</label>
          <input id="searchInput" type="text" placeholder="输入人物姓名，例如：李开复 / Geoffrey Hinton" />
        </div>

        <div class="field">
          <div class="row">
            <a class="btn" href="./map.html">时间轴地图</a>
            <a class="btn secondary" href="../">Docs</a>
          </div>
        </div>

        <div class="footer">
          数据：<a href="../data/relations.json">relations.json</a>
        </div>
      </aside>

      <main class="graphWrap">
        <div id="graph"><canvas id="graphCanvas"></canvas></div>
      </main>
    </div>
    <script type="module" src="./graph.js"></script>
  </body>
</html>
