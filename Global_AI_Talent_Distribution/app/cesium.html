<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AI 人才时空分布 · Cesium</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./kimi.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #cesiumContainer { width: 100%; height: 100%; }
    .map { position: relative; overflow: hidden; }
    .map::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 820px at 60% 42%, rgba(255,255,255,0.0), rgba(0,0,0,0.08) 72%, rgba(0,0,0,0.16) 100%),
        radial-gradient(1200px 920px at 40% 58%, rgba(255,255,255,0.0), rgba(0,0,0,0.06) 72%, rgba(0,0,0,0.12) 100%);
      mix-blend-mode: multiply;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1 class="brand">🌍 AI 人才时空分布</h1>
      <div class="hint">拖动时间轴，观察 AI 人才每年的空间分布。</div>
      <div class="field">
        <div class="valueRow">
          <div class="valueLabel">年份</div>
          <div class="valueRight">
            <span class="valueTag">当前</span>
            <span id="yearValue" class="valueNumber">2023</span>
          </div>
        </div>
        <input id="yearSlider" class="slider" type="range" min="1912" max="2026" step="1" value="2023" />
        <div class="kv"><span id="minYear">1912</span><span id="maxYear">2026</span></div>
      </div>
      <div class="field">
        <div class="valueRow">
          <div class="valueLabel">播放速度</div>
          <div class="valueRight">
            <span class="valueTag">当前</span>
            <span id="speedValue" class="valueNumber">0.5 年/秒</span>
          </div>
        </div>
        <input id="playSpeed" class="slider" type="range" min="0.5" max="6" step="0.5" value="0.5" />
        <div class="kv"><span>0.5</span><span>6</span></div>
        <div class="controlsRow">
          <button id="playToggle" class="btn icon" title="播放">▶</button>
        </div>
      </div>
      <div class="field">
        <div class="row" style="align-items:center;justify-content:space-between">
          <label style="margin:0">🧭 迁移关系（Chord）</label>
          <select id="chordLevel" class="select" style="width:140px">
            <option value="continent" selected>洲际</option>
            <option value="country">国家</option>
            <option value="city">城市</option>
          </select>
        </div>
        <canvas id="chordCanvas" class="miniCanvas" width="280" height="220" style="height:220px"></canvas>
      </div>
      <div class="field">
        <label>各城市 AI 人才数量（Top）</label>
        <canvas id="barCanvas" class="miniCanvas" width="280" height="170" style="height:170px"></canvas>
        <div class="kv"><span id="powerLawLabel" style="opacity:0.85">Power law: -</span><span></span></div>
      </div>
      <div class="field">
        <div style="display:flex;gap:8px;">
          <a class="btn secondary" href="./graph.html">🕸️ 关系网</a>
        </div>
      </div>
    </aside>
    <main class="map">
      <div id="cesiumContainer"></div>
      <div class="hud" id="hud">
        <div class="hudRow">
          <span class="hudLabel">年份</span>
          <span class="hudValue" id="hudYear">2023</span>
          <span class="hudSep">·</span>
          <span class="hudLabel">速度</span>
          <span class="hudValue" id="hudSpeed">0.5 年/秒</span>
        </div>
      </div>
      <div class="infoCard" id="infoCard" hidden>
        <div class="infoHead">
          <div class="infoTitle" id="infoTitle">地点详情</div>
          <button class="infoClose" id="infoClose" title="关闭">×</button>
        </div>
        <div class="infoSub" id="infoSub"></div>
        <div class="infoList" id="infoList"></div>
      </div>
    </main>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
        "three-globe": "https://cdn.jsdelivr.net/npm/three-globe@2.45.2/+esm",
        "topojson-client": "https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/+esm"
      }
    }
  </script>
  <script type="module" src="./cesium.js?v=20260422-15"></script>
</body>
</html>
