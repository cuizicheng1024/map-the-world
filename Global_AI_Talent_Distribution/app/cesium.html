<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 人才时空分布 · Cesium</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./kimi.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #cesiumContainer { width: 100%; height: 100%; }
    .cesium-viewer-toolbar { display: none !important; }
    .sidebar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 320px;
      background: rgba(11, 16, 32, 0.92);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      color: #e6edf3;
      font-size: 13px;
      z-index: 10;
      overflow-y: auto;
    }
    .brand { font-weight: 700; letter-spacing: 0.2px; margin: 0 0 10px 0; }
    .hint { opacity: 0.82; line-height: 1.5; margin-bottom: 14px; }
    .field { margin-top: 14px; }
    .field label { display: block; font-size: 12px; opacity: 0.78; margin-bottom: 6px; }
    input[type="range"] { width: 100%; }
    .btn {
      background: rgba(125, 211, 252, 0.18);
      border: 1px solid rgba(125, 211, 252, 0.3);
      color: #e6edf3;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
    }
    .btn.secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.12); }
    .btn.icon { min-width: 46px; padding: 9px 10px; font-size: 14px; letter-spacing: 0; }
    .kv { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.8; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <aside class="sidebar">
    <h1 class="brand">AI 人才时空分布</h1>
    <div class="hint">拖动时间轴，观察 AI 人才节点在 3D 地球上的迁徙与分裂。</div>
    <div class="field">
      <label>年份</label>
      <input id="yearSlider" type="range" min="1912" max="2026" step="1" value="2023" />
      <div class="kv"><span id="minYear">1912</span><span id="maxYear">2026</span></div>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <button id="playBtn" class="btn icon" title="播放">▶</button>
        <button id="pauseBtn" class="btn secondary icon" title="暂停">⏸</button>
      </div>
    </div>
    <div class="field">
      <label>播放速度（年/秒）</label>
      <input id="playSpeed" type="range" min="0.5" max="6" step="0.5" value="2" />
      <div class="kv"><span>0.5</span><span>6</span></div>
    </div>
    <div class="field">
      <label>过滤（人 / 公司 / 城市）</label>
      <input id="filterInput" type="text" placeholder="例如：Aidan Gomez / OpenAI / San Francisco" />
    </div>
    <div class="field">
      <div style="display:flex;gap:8px;">
        <a class="btn secondary" href="./graph.html">关系网</a>
      </div>
    </div>
  </aside>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script type="module" src="./cesium.js"></script>
</body>
</html>
