<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360">
  <defs>
    <style>
      .bg { fill: #f6fbff; stroke: #d7e6f2; stroke-width: 2; }
      .grid { stroke: #d7e6f2; stroke-width: 1; fill: none; }
      .title { font: 600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial; fill: #1f2d3d; }
      .label { font: 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial; fill: #51606d; }
      .route { stroke: #1f6feb; stroke-width: 5; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <text x="20" y="28" class="title">等角航线（恒向线）：地球仪（曲）→ 墨卡托（直）</text>

  <g transform="translate(20 46)">
    <text x="0" y="18" class="label">地球仪：同一条恒向线呈曲线</text>
    <circle cx="200" cy="170" r="150" class="bg" />
    <g>
      <path d="M 200 20 A 150 150 0 0 0 200 320" class="grid" opacity="0.0" />
      <path d="M 50 170 H 350" class="grid" />
      <path d="M 200 20 V 320" class="grid" />
      <path d="M 85 95 C 150 60, 250 60, 315 95" class="grid" />
      <path d="M 75 245 C 145 290, 255 290, 325 245" class="grid" />
      <path d="M 110 60 C 130 120, 130 220, 110 280" class="grid" opacity="0.7" />
      <path d="M 290 60 C 270 120, 270 220, 290 280" class="grid" opacity="0.7" />
    </g>
    <path d="M 95 250 C 155 155, 240 120, 315 110" class="route" />
  </g>

  <g transform="translate(470 46)">
    <text x="0" y="18" class="label">墨卡托投影：同一条恒向线呈直线</text>
    <rect x="0" y="30" width="400" height="280" rx="10" class="bg" />
    <g transform="translate(0 30)">
      <path d="M 40 0 V 280" class="grid" opacity="0.7" />
      <path d="M 120 0 V 280" class="grid" opacity="0.7" />
      <path d="M 200 0 V 280" class="grid" opacity="0.7" />
      <path d="M 280 0 V 280" class="grid" opacity="0.7" />
      <path d="M 360 0 V 280" class="grid" opacity="0.7" />
      <path d="M 0 60 H 400" class="grid" />
      <path d="M 0 140 H 400" class="grid" />
      <path d="M 0 220 H 400" class="grid" />
    </g>
    <path d="M 50 260 L 350 120" class="route" />
  </g>
</svg>
